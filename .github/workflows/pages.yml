name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (if package.json has a build script)
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm ci
            npm run build
          fi

      - name: Determine publish directory
        id: set-dir
        run: |
          if [ -d dist ]; then echo "dir=dist" >> "$GITHUB_OUTPUT";
          elif [ -d build ]; then echo "dir=build" >> "$GITHUB_OUTPUT";
          elif [ -d public ]; then echo "dir=public" >> "$GITHUB_OUTPUT";
          else echo "dir=." >> "$GITHUB_OUTPUT";
        shell: bash

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ${{ steps.set-dir.outputs.dir }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
