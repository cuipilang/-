name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (if package.json has a build script)
        run: |
          if [ -f package.json ] && grep -q '"build"' package.json; then
            npm ci
            npm run build
          fi

      - name: Determine publish directory
        id: setdir
        run: |
          if [ -d dist ]; then echo "PUBLISH_DIR=dist" >> "$GITHUB_ENV";
          elif [ -d build ]; then echo "PUBLISH_DIR=build" >> "$GITHUB_ENV";
          elif [ -d public ]; then echo "PUBLISH_DIR=public" >> "$GITHUB_ENV";
          else echo "PUBLISH_DIR=." >> "$GITHUB_ENV";
          fi
        shell: bash

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
